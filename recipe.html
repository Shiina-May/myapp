<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow, noarchive">
<title>Recipe Note</title>
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Lato:wght@300;400;700&family=Caveat:wght@500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#f5ece3; --or:#c8825a; --or-dk:#9e5a35; --or-lt:#e8b898;
  --text:#3d2a1e; --muted:#7a5c48; --border:#dcc0aa;
  --card:rgba(255,255,255,0.82); --sand:#f0e0d0;
}
textarea.fi {
  min-height: 120px;
  resize: vertical;
  line-height: 1.6;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Lato','Hiragino Kaku Gothic ProN',sans-serif;background:var(--bg);
  background-image:radial-gradient(ellipse 800px 450px at 8% 15%,rgba(200,130,90,.2) 0%,transparent 65%),
  radial-gradient(ellipse 650px 450px at 92% 78%,rgba(158,90,53,.15) 0%,transparent 65%);
  background-attachment:fixed;min-height:100vh;color:var(--text);}

header{text-align:center;padding:52px 24px 32px;}
.badge{display:inline-block;background:rgba(255,255,255,.5);border:1.5px solid var(--border);border-radius:99px;padding:5px 20px;font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--or-dk);font-weight:700;margin-bottom:14px;}
.title{font-family:'Great Vibes',cursive;font-size:clamp(3rem,8vw,5.5rem);color:var(--or-dk);line-height:1.1;margin-bottom:8px;}
.sub{font-size:13px;color:var(--muted);letter-spacing:1.5px;}

main{max-width:960px;margin:0 auto;padding:28px 24px 80px;}
.top-bar{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;margin-bottom:20px;}
.sec-title{font-size:10px;letter-spacing:4px;text-transform:uppercase;color:var(--muted);font-weight:700;}
.add-btn{background:var(--or);color:#fff;border:none;border-radius:50px;padding:11px 24px;font-size:13px;font-weight:700;cursor:pointer;font-family:'Lato',sans-serif;box-shadow:0 3px 12px rgba(200,130,90,.35);transition:background .15s,transform .1s;}
.add-btn:hover{background:var(--or-dk);transform:translateY(-1px);}

.filter-bar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:24px;}
.fb{background:rgba(255,255,255,.6);border:1.5px solid var(--border);border-radius:30px;padding:7px 15px;font-size:12px;font-weight:700;color:var(--muted);cursor:pointer;font-family:'Lato',sans-serif;transition:all .15s;}
.fb:hover,.fb.active{background:var(--or);border-color:var(--or);color:#fff;}

.recipe-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:20px;}

.rc{background:var(--card);border:1.5px solid var(--border);border-radius:18px;overflow:hidden;box-shadow:4px 6px 18px rgba(158,90,53,.1);transition:transform .18s,box-shadow .18s;cursor:pointer;}
.rc:hover{transform:translateY(-4px);box-shadow:6px 14px 30px rgba(158,90,53,.16);}
.rc-img{width:100%;height:140px;object-fit:cover;display:block;background:var(--sand);}
.rc-img-ph{width:100%;height:140px;background:linear-gradient(135deg,var(--or-lt),var(--sand));display:flex;align-items:center;justify-content:center;font-size:42px;opacity:.4;}
.rc-bar{height:4px;background:var(--or);}
.rc-body{padding:18px 18px 14px;}
.rc-cat{display:inline-block;font-size:10px;letter-spacing:1.5px;text-transform:uppercase;font-weight:700;padding:2px 9px;border-radius:20px;margin-bottom:8px;background:rgba(200,130,90,.12);color:var(--or-dk);}
.rc-name{font-family:'Great Vibes',cursive;font-size:1.7rem;color:var(--text);margin-bottom:6px;line-height:1.2;}
.rc-memo{font-family:'Caveat',cursive;font-size:14px;color:var(--muted);line-height:1.6;margin-bottom:12px;min-height:36px;}
.rc-tags{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;}
.tag{background:var(--sand);border-radius:10px;padding:3px 9px;font-size:11px;color:var(--muted);}
.rc-footer{display:flex;justify-content:space-between;align-items:center;padding-top:10px;border-top:1px solid var(--border);}
.rc-info{font-size:11px;color:var(--muted);}
.rc-actions{display:flex;gap:6px;}
.ab{background:none;border:1px solid var(--border);border-radius:8px;padding:4px 10px;font-size:12px;cursor:pointer;color:var(--muted);font-family:'Lato',sans-serif;transition:all .15s;}
.ab:hover{background:var(--sand);color:var(--text);}
.ab.del:hover{background:#fde8e8;border-color:#e07070;color:#c04040;}

.empty{text-align:center;padding:70px 20px;grid-column:1/-1;color:var(--muted);}
.empty-icon{font-size:48px;opacity:.35;margin-bottom:16px;}
.empty-title{font-family:'Great Vibes',cursive;font-size:1.8rem;opacity:.6;margin-bottom:8px;}

/* Overlay */
.overlay{display:none;position:fixed;inset:0;z-index:1000;background:rgba(61,42,30,.52);backdrop-filter:blur(5px);align-items:flex-start;justify-content:center;padding:20px 16px;overflow-y:auto;}
.overlay.open{display:flex;}

/* Modal */
.modal{background:#fff9f4;border-radius:22px;padding:30px 26px;width:100%;max-width:640px;box-shadow:0 24px 64px rgba(0,0,0,.2);position:relative;margin:auto;}
.mc{position:absolute;top:14px;right:16px;background:var(--sand);border:none;border-radius:50%;width:30px;height:30px;font-size:14px;cursor:pointer;color:var(--text);transition:background .15s;}
.mc:hover{background:#e07070;color:#fff;}
.modal-title{font-family:'Great Vibes',cursive;font-size:2rem;color:var(--or-dk);margin-bottom:22px;}

/* Form */
.fg{margin-bottom:14px;}
.fl{display:block;font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:6px;}
.fi,.fs{width:100%;padding:9px 13px;border:1.5px solid var(--border);border-radius:10px;background:rgba(255,255,255,.88);font-size:14px;font-family:'Lato','Hiragino Kaku Gothic ProN',sans-serif;color:var(--text);outline:none;transition:border-color .2s;}
.fi:focus,.fs:focus{border-color:var(--or);box-shadow:0 0 0 3px rgba(200,130,90,.1);}
.frow{display:flex;gap:12px;}
.frow .fg{flex:1;}

/* Dynamic rows */
.dyn-list{display:flex;flex-direction:column;gap:7px;margin-bottom:7px;}
.dyn-row{display:flex;gap:7px;align-items:center;}
.dyn-row .fi{flex:1;}
.dyn-row .fi.qty{flex:0 0 85px;}
.step-num{font-size:12px;font-weight:700;color:var(--or);min-width:18px;text-align:right;flex-shrink:0;}
.rm-btn{background:none;border:1px solid var(--border);border-radius:7px;width:28px;height:32px;cursor:pointer;color:var(--muted);font-size:13px;flex-shrink:0;transition:all .15s;display:flex;align-items:center;justify-content:center;}
.rm-btn:hover{background:#fde8e8;border-color:#e07070;color:#c04040;}
.add-row-btn{background:none;border:1.5px dashed var(--border);border-radius:10px;padding:7px 12px;font-size:12px;font-weight:700;color:var(--muted);cursor:pointer;font-family:'Lato',sans-serif;width:100%;transition:all .15s;margin-top:3px;}
.add-row-btn:hover{border-color:var(--or);color:var(--or);}

/* Photo */
.photo-zone{border:2px dashed var(--border);border-radius:12px;padding:16px;text-align:center;cursor:pointer;position:relative;transition:border-color .2s,background .2s;}
.photo-zone:hover{border-color:var(--or);background:rgba(200,130,90,.04);}
.photo-zone input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;}
.photo-zone p{font-size:13px;color:var(--muted);pointer-events:none;}
.photo-previews{display:flex;gap:8px;flex-wrap:wrap;margin-top:9px;}
.photo-thumb{position:relative;}
.photo-thumb img{width:70px;height:70px;object-fit:cover;border-radius:9px;border:2px solid var(--border);display:block;}
.photo-controls {
  display: flex;
  gap: 4px;
  justify-content: center;
  margin-top: 6px;
}

.photo-controls button {
  border: 1px solid var(--border);
  background: #fff;
  border-radius: 6px;
  padding: 2px 6px;
  font-size: 12px;
  cursor: pointer;
}

.photo-controls button:hover {
  background: var(--sand);
}
/* Nutrition */
.nutr-box{background:rgba(200,130,90,.08);border:1.5px solid var(--or-lt);border-radius:13px;padding:14px 16px;margin-top:14px;}
.nutr-title{font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--or-dk);margin-bottom:10px;}
.nutr-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;}
.nutr-item{text-align:center;}
.nutr-val{font-size:1.3rem;font-weight:700;color:var(--or-dk);line-height:1;}
.nutr-lbl{font-size:10px;color:var(--muted);margin-top:3px;letter-spacing:.5px;}
.nutr-note{font-size:10px;color:var(--muted);margin-top:8px;}

.modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:22px;}
.btn-cancel{background:var(--sand);border:none;border-radius:30px;padding:10px 18px;font-size:13px;font-weight:700;cursor:pointer;font-family:'Lato',sans-serif;color:var(--muted);}
.btn-save{background:var(--or);color:#fff;border:none;border-radius:30px;padding:10px 24px;font-size:13px;font-weight:700;cursor:pointer;font-family:'Lato',sans-serif;transition:background .15s;}
.btn-save:hover{background:var(--or-dk);}

/* Detail */
.dm{background:#fff9f4;border-radius:22px;padding:30px 26px;width:100%;max-width:640px;box-shadow:0 24px 64px rgba(0,0,0,.2);position:relative;margin:auto;}
.dm-bar{height:5px;border-radius:4px;background:var(--or);margin-bottom:18px;}
.dm-name{font-family:'Great Vibes',cursive;font-size:2.3rem;color:var(--text);margin-bottom:4px;}
.dm-meta{font-size:12px;color:var(--muted);margin-bottom:20px;}
.dm-sec{margin-bottom:18px;}
.dm-sec-t{font-size:10px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;color:var(--or-dk);margin-bottom:10px;}
.ing-list{list-style:none;}
.ing-list li{display:flex;align-items:center;gap:10px;padding:6px 0;border-bottom:1px solid var(--border);font-size:14px;}
.ing-list li::before{content:'·';color:var(--or);font-size:18px;line-height:1;}
.ing-qty{color:var(--muted);font-size:13px;margin-left:auto;white-space:nowrap;}
.step-list{list-style:none;counter-reset:s;}
.step-list li{counter-increment:s;display:flex;gap:11px;padding:9px 0;border-bottom:1px solid var(--border);font-size:14px;line-height:1.65;}
.step-list li::before{content:counter(s);background:var(--or);color:#fff;font-size:11px;font-weight:700;width:21px;height:21px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;}
.dm-photos{display:flex;gap:8px;flex-wrap:wrap;}
.dm-photos img{width:86px;height:86px;object-fit:cover;border-radius:10px;}
.image-modal {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.75);
  z-index: 9999;
  justify-content: center;
  align-items: center;
  padding: 20px;
}

.image-modal.show {
  display: flex;
}

.image-modal-img {
  max-width: 90vw;
  max-height: 85vh;
  border-radius: 12px;
  box-shadow: 0 8px 30px rgba(0,0,0,0.3);
}

#imgPrevBtn,
#imgNextBtn,
#imgCloseBtn {
  position: absolute;
  background: rgba(255,255,255,0.9);
  border: none;
  border-radius: 999px;
  padding: 10px 14px;
  font-size: 18px;
  cursor: pointer;
}

#imgPrevBtn {
  left: 20px;
  top: 50%;
  transform: translateY(-50%);
}

#imgNextBtn {
  right: 20px;
  top: 50%;
  transform: translateY(-50%);
}

#imgCloseBtn {
  top: 20px;
  right: 20px;
}
.dm-memo{font-family:'Caveat',cursive;font-size:15px;color:var(--muted);background:rgba(200,130,90,.06);border-left:3px solid var(--or);padding:11px 15px;border-radius:0 10px 10px 0;line-height:1.7;white-space:pre-wrap;}
.dm-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:18px;padding-top:14px;border-top:1px solid var(--border);}

footer{text-align:center;padding:24px;font-size:11px;color:var(--muted);opacity:.5;letter-spacing:2px;}
@media(max-width:580px){
  header{padding:36px 18px 24px;}main{padding:20px 16px 60px;}
  .recipe-grid{grid-template-columns:1fr;}.frow{flex-direction:column;gap:0;}
  .nutr-grid{grid-template-columns:repeat(2,1fr);}
}
</style>
</head>

<div class="overlay" id="fmOverlay">

  <div class="modal-title" id="fmTitle">New Recipe</div>
  <div class="frow">
    <div class="fg" style="flex:2">
      <label class="fl">レシピ名 *</label>
      <input type="text" class="fi" id="f-name" placeholder="例：肉じゃが">
    </div>
    <div class="fg">
      <label class="fl">カテゴリ</label>
      <select class="fs" id="f-cat">

    <div class="photo-previews" id="photoPreviews"></div>
  </div>

<div class="fg">
  <label class="fl">メモ・コツ</label>
  <textarea class="fi" id="f-memo" rows="6" placeholder="ポイントや気づきなど…"></textarea>
</div>

  <div class="nutr-box" id="nutrBox" style="display:none">
    <div class="nutr-title">🔢 推定栄養値（全体）</div>
    <div class="nutr-grid">
      <div class="nutr-item"><div class="nutr-val" id="nCal">—</div><div class="nutr-lbl">kcal</div></div>
      <div class="nutr-item"><div class="nutr-val" id="nPro">—</div><div class="nutr-lbl">タンパク質 g</div></div>
      <div class="nutr-item"><div class="nutr-val" id="nFat">—</div><div class="nutr-lbl">脂質 g</div></div>
      <div class="nutr-item"><div class="nutr-val" id="nCarb">—</div><div class="nutr-lbl">炭水化物 g</div></div>
    </div>
    <div class="nutr-note">※ 主な食材のみの推定値です。目安としてご利用ください。</div>
  </div>

  <div class="modal-actions">
    <button class="btn-cancel" id="cancelFmBtn">キャンセル</button>
    <button class="btn-save" id="saveFmBtn">保存する</button>
  </div>
</div>
</div>

<!-- Detail Modal -->
<div class="overlay" id="dtOverlay">
<div class="dm">
  <button class="mc" id="closeDtBtn">✕</button>
  <div class="dm-bar"></div>
  <div class="dm-name" id="dtName"></div>
  <div class="dm-meta" id="dtMeta"></div>
  <div class="dm-sec" id="dtIngSec"><div class="dm-sec-t">🧺 材料</div><ul class="ing-list" id="dtIng"></ul></div>
  <div class="dm-sec" id="dtStepSec"><div class="dm-sec-t">📋 作り方</div><ol class="step-list" id="dtSteps"></ol></div>
  <div class="dm-sec" id="dtPhotoSec"><div class="dm-sec-t">📷 写真</div><div class="dm-photos" id="dtPhotos"></div></div>
  <div class="dm-sec" id="dtMemoSec"><div class="dm-sec-t">📝 メモ</div><div class="dm-memo" id="dtMemo"></div></div>
  <div class="dm-sec" id="dtNutrSec">
    <div class="dm-sec-t">🔢 推定栄養値</div>
    <div class="nutr-grid" id="dtNutrGrid"></div>
    <div class="nutr-note">※ 主な食材のみの推定値です。</div>

  <div class="dm-actions">
    <button class="btn-cancel" id="closeDtBtn2">閉じる</button>
    <button class="btn-save" id="editDtBtn">編集</button>
  </div>
</div>
</div>
<div id="imageModal" class="image-modal">
  <button type="button" id="imgPrevBtn" onclick="showPrevImage()">←</button>
  <img id="imageModalImg" class="image-modal-img" src="" alt="拡大画像">
  <button type="button" id="imgNextBtn" onclick="showNextImage()">→</button>
  <button type="button" id="imgCloseBtn" onclick="closeImageModal()">×</button>
</div>
<div class="overlay" id="trashOverlay">
  <div class="modal">
    <button class="mc" id="closeTrashBtn">✕</button>
    <div class="modal-title">Trash</div>
    <div id="trashList"></div>
  </div>
</div>
<script>
'use strict';
function showToast(msg, bg) {
  var el = document.getElementById('toastMsg');
  el.textContent = msg;
  el.style.background = bg || '#333';
  el.style.display = 'block';
  clearTimeout(el._timer);
  el._timer = setTimeout(function() {
    el.style.display = 'none';
  }, 3200);
}

function showError(msg) {
  showToast(msg, '#c04040');
}

function showSuccess(msg) {
  showToast(msg, '#2d7a46');
}

function parseGrams(qty) {
  if (!qty) return null;
  const s = qty.trim();
  let m;
  if ((m = s.match(/(\d+\.?\d*)\s*kg/i))) return +m[1] * 1000;
  if ((m = s.match(/(\d+\.?\d*)\s*g/i)))  return +m[1];
  if ((m = s.match(/(\d+\.?\d*)\s*ml/i))) return +m[1];
  if ((m = s.match(/(\d+\.?\d*)\s*個/)))  return +m[1] * 100;
  if ((m = s.match(/(\d+\.?\d*)\s*枚/)))  return +m[1] * 60;
  if ((m = s.match(/(\d+\.?\d*)\s*本/)))  return +m[1] * 100;
  if ((m = s.match(/大さじ\s*(\d+\.?\d*)/))) return +m[1] * 15;
  if ((m = s.match(/小さじ\s*(\d+\.?\d*)/))) return +m[1] * 5;
  if ((m = s.match(/(\d+\.?\d*)\s*カップ/))) return +m[1] * 200;
  if ((m = s.match(/^(\d+\.?\d*)/)))      return +m[1] * 80;
  return null;
}

function calcNutr(ings) {
  let cal=0,p=0,f=0,c=0,found=false;
  ings.forEach(function(ing) {
    if (!ing.name) return;
    var nl = ing.name.toLowerCase();
    var g = parseGrams(ing.qty);
    if (!g) return;
    var entry = NUTR_DB.find(function(d) {
      return d.k.some(function(k) { return nl.includes(k); });
    });
    if (entry) {
      var r = g / 100;
      cal += entry.cal * r;
      p   += entry.p * r;
      f   += entry.f * r;
      c   += entry.c * r;
      found = true;
    }
  });
  return found ? {cal:Math.round(cal), p:Math.round(p*10)/10, f:Math.round(f*10)/10, c:Math.round(c*10)/10} : null;
}

function isHeicLike(file) {
  if (!file) return false;

  var type = (file.type || '').toLowerCase();
  var name = (file.name || '').toLowerCase();

  return (
    type.includes('heic') ||
    type.includes('heif') ||
    name.endsWith('.heic') ||
    name.endsWith('.heif')
  );
}
function compressImage(file) {
  return new Promise(function(resolve, reject) {
    var reader = new FileReader();

    reader.onload = function(e) {
      var img = new Image();

      img.onload = function() {
        var maxW = 1600;
        var maxH = 1600;
        var w = img.width;
        var h = img.height;

        if (w > maxW || h > maxH) {
          var ratio = Math.min(maxW / w, maxH / h);
          w = Math.round(w * ratio);
          h = Math.round(h * ratio);
        }

        var canvas = document.createElement('canvas');
        canvas.width = w;
        canvas.height = h;

        var ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, w, h);

        var dataUrl = canvas.toDataURL('image/jpeg', 0.82);
        resolve(dataUrl);
      };

      img.onerror = function() {
        reject(new Error('画像の読み込みに失敗しました。HEIC/HEIF形式の可能性があります。'));
};

      img.src = e.target.result;
    };

    reader.onerror = function() {
      reject(new Error('ファイルの読み込みに失敗しました'));
    };
    

    reader.readAsDataURL(file);
  });
}

  renderPhotoPreviews();
  this.value = '';
});

function movePhotoRight(index) {
  if (index >= formPhotos.length - 1) return;
  var temp = formPhotos[index];
  formPhotos[index] = formPhotos[index + 1];
  formPhotos[index + 1] = temp;
  renderPhotoPreviews();
}

function renderTrash() {

  if (!trash.length) {
    wrap.innerHTML = '<div class="empty"><div class="empty-icon">🗑</div><div class="empty-title">ゴミ箱は空です</div></div>';

  }

  wrap.innerHTML = trash.map(function(item, i) {

    return '<div class="rc" style="margin-bottom:12px; cursor:default;">' +
      '<div class="rc-body">' +
        '<span class="rc-cat">🗑 ' + escHtml(r.cat || 'その他') + '</span>' +
        '<div class="rc-name">' + escHtml(r.name || '名称なし') + '</div>' +
        '<div class="rc-memo">' + (r.memo ? escHtml(r.memo.slice(0, 60)) : '<span style="opacity:.3">メモなし</span>') + '</div>' +
        '<div class="rc-actions" style="margin-top:12px;">' +
          '<button class="ab restore-btn" data-i="' + i + '">復元</button>' +
          '<button class="ab del forever-btn" data-i="' + i + '">完全削除</button>' +
        '</div>' +
      '</div>' +
    '</div>';
  }).join('');

  wrap.querySelectorAll('.restore-btn').forEach(function(btn) {
    btn.addEventListener('click', function() {
      restoreTrashItem(+btn.dataset.i);
    });
  });

  wrap.querySelectorAll('.forever-btn').forEach(function(btn) {
    btn.addEventListener('click', function() {
      deleteTrashItem(+btn.dataset.i);
    });
  });
}

function restoreTrashItem(index) {
  var trash = loadTrash();
  var item = trash[index];
  if (!item || !item.recipe) return;

  recipes.unshift(item.recipe);

  if (!save()) {
    recipes = recipes.filter(function(x) {
      return x.id !== item.recipe.id;
    });
    showError('復元に失敗しました');
    return;
  }

  trash.splice(index, 1);
  saveTrash(trash);
  render();
  renderTrash();
  showSuccess('レシピを復元しました');
}
function deleteTrashItem(index) {
  var trash = loadTrash();
  if (!trash[index]) return;

  if (!confirm('完全に削除しますか？元に戻せません。')) return;

  trash.splice(index, 1);

  if (!saveTrash(trash)) return;

  renderTrash();
  showSuccess('完全に削除しました');
}
function delR(id) {
  var r = recipes.find(function(x) { return x.id === id; });
  if (!r) return;

  if (!confirm('このレシピをゴミ箱に移動しますか？')) return;

  var trash = loadTrash();
  trash.unshift({
    deletedAt: new Date().toISOString(),
    recipe: r
  });

  if (!saveTrash(trash)) return;

  var backup = recipes.slice();
  recipes = recipes.filter(function(x) { return x.id !== id; });

  if (!save()) {
    recipes = backup;
    showError('ゴミ箱への移動に失敗しました');
    return;
  }

  render();
  showSuccess('ゴミ箱に移動しました');
}

  var stepSec = document.getElementById('dtStepSec');
  if (r.steps && r.steps.length) {
    stepSec.style.display = '';
    document.getElementById('dtSteps').innerHTML = r.steps.map(function(s){ return '<li>' + escHtml(s) + '</li>'; }).join('');
  } else { stepSec.style.display = 'none'; }

var photoSec = document.getElementById('dtPhotoSec');

if (r.photos && r.photos.length) {
  photoSec.style.display = '';
  document.getElementById('dtPhotos').innerHTML = r.photos.map(function(s, i){
    return '<img src="' + s + '" alt="" data-index="' + i + '">';
  }).join('');

  document.querySelectorAll('#dtPhotos img').forEach(function(img, i) {
    img.addEventListener('click', function() {
      openImageModal(r.photos[i], r.photos);
    });
  });
} else {
  photoSec.style.display = 'none';
}

  var memoSec = document.getElementById('dtMemoSec');
  if (r.memo) { memoSec.style.display=''; document.getElementById('dtMemo').textContent = r.memo; }
  else { memoSec.style.display = 'none'; }

  var nutrSec = document.getElementById('dtNutrSec');
  if (r.nutr) {
    nutrSec.style.display = '';
    document.getElementById('dtNutrGrid').innerHTML =
      '<div class="nutr-item"><div class="nutr-val">'+r.nutr.cal+'</div><div class="nutr-lbl">kcal</div></div>' +
      '<div class="nutr-item"><div class="nutr-val">'+r.nutr.p+'</div><div class="nutr-lbl">タンパク質 g</div></div>' +
      '<div class="nutr-item"><div class="nutr-val">'+r.nutr.f+'</div><div class="nutr-lbl">脂質 g</div></div>' +
      '<div class="nutr-item"><div class="nutr-val">'+r.nutr.c+'</div><div class="nutr-lbl">炭水化物 g</div></div>';
  } else { nutrSec.style.display = 'none'; }

  openOverlay('dtOverlay');
}

document.getElementById('closeDtBtn').addEventListener('click', function(){ closeOverlay('dtOverlay'); });
document.getElementById('closeDtBtn2').addEventListener('click', function(){ closeOverlay('dtOverlay'); });
document.getElementById('editDtBtn').addEventListener('click', function(){ closeOverlay('dtOverlay'); openEdit(dtId); });
document.getElementById('dtOverlay').addEventListener('click', function(e){ if(e.target===this) closeOverlay('dtOverlay'); });

// ===== Overlay helpers =====
function openOverlay(id)  { document.getElementById(id).classList.add('open'); document.body.style.overflow='hidden'; }
function closeOverlay(id) { document.getElementById(id).classList.remove('open'); document.body.style.overflow=''; }

// ===== Escape HTML =====
function escHtml(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') {
    closeImageModal();
    closeOverlay('fmOverlay');
    closeOverlay('dtOverlay');
    closeOverlay('trashOverlay');
  }
});
function openImageModal(src, photoList) {
  const modal = document.getElementById('imageModal');
  const img = document.getElementById('imageModalImg');

  currentImageList = photoList.slice();
  currentImageIndex = currentImageList.indexOf(src);

  if (currentImageIndex === -1) currentImageIndex = 0;

  img.src = currentImageList[currentImageIndex];
  modal.classList.add('show');
}

function showPrevImage() {
  if (!currentImageList.length) return;

  currentImageIndex--;
  if (currentImageIndex < 0) {
    currentImageIndex = currentImageList.length - 1;
  }

  document.getElementById('imageModalImg').src = currentImageList[currentImageIndex];
}

function showNextImage() {
  if (!currentImageList.length) return;

  currentImageIndex++;
  if (currentImageIndex >= currentImageList.length) {
    currentImageIndex = 0;
  }

  document.getElementById('imageModalImg').src = currentImageList[currentImageIndex];
}

function closeImageModal() {
  document.getElementById('imageModal').classList.remove('show');
  currentImageList = [];
  currentImageIndex = 0;
}

document.getElementById('imageModal').addEventListener('click', function(e) {
  if (e.target === this) closeImageModal();
});

load();
render();
