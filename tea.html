<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tea Diary</title>
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#fdf6ec; --br-dk:#4a2c1a; --br-md:#7b4a2d; --br-lt:#c8955c;
  --gold:#d4a942; --text:#3b2415; --muted:#7a5c3a; --border:#ddc8a8;
  --cream:#fdf6ec; --card:#fff; --shadow:rgba(74,44,26,.15);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Lato','Hiragino Kaku Gothic ProN',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}

/* Header */
header{background:linear-gradient(135deg,var(--br-dk),var(--br-md));color:var(--cream);text-align:center;padding:2.5rem 1rem 1.8rem;position:relative;overflow:hidden;}
header::before{content:'';position:absolute;inset:0;background:url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Ccircle cx='30' cy='30' r='20' fill='%23c8955c' fill-opacity='0.08'/%3E%3C/svg%3E");opacity:.6;}
.h-title{font-family:'Great Vibes',cursive;font-size:clamp(3rem,8vw,5rem);color:#fdf6ec;line-height:1.1;position:relative;margin-bottom:6px;}
.h-sub{font-size:.9rem;opacity:.75;position:relative;letter-spacing:.05em;}

/* Nav */
nav{display:flex;background:var(--br-dk);position:sticky;top:0;z-index:100;}
nav button{flex:1;padding:.85rem .5rem;border:none;background:transparent;color:rgba(255,255,255,.6);font-size:.88rem;cursor:pointer;font-family:'Lato',sans-serif;letter-spacing:.03em;transition:all .2s;}
nav button.active{color:#fff;background:var(--br-md);border-bottom:3px solid var(--gold);}
nav button:hover:not(.active){color:#fff;background:rgba(255,255,255,.08);}

/* Main */
main{max-width:880px;margin:0 auto;padding:1.5rem 1rem 3rem;}
.tab-content{display:none;}.tab-content.active{display:block;}

/* ===== TOP PAGE ===== */
.top-hero{text-align:center;padding:1.5rem 0 1rem;}
.top-hero-title{font-family:'Great Vibes',cursive;font-size:2.2rem;color:var(--br-dk);margin-bottom:.4rem;}
.top-hero-sub{font-size:.88rem;color:var(--muted);}

.tea-category-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:14px;margin:1.4rem 0 2rem;}
.tea-cat-card{background:#fff;border-radius:14px;padding:1.2rem 1rem;text-align:center;cursor:pointer;border:2px solid transparent;box-shadow:0 2px 10px var(--shadow);transition:transform .18s,border-color .18s,box-shadow .18s;}
.tea-cat-card:hover{transform:translateY(-3px);box-shadow:0 6px 20px var(--shadow);}
.tea-cat-card.selected{border-color:var(--gold);}
.cat-icon{font-size:2rem;margin-bottom:.5rem;}
.cat-name{font-size:.9rem;font-weight:700;color:var(--br-dk);}
.cat-name-en{font-size:.72rem;color:var(--muted);margin-top:2px;}
.cat-count{font-size:.72rem;color:var(--gold);margin-top:4px;font-weight:700;}

.top-recent{margin-top:.5rem;}
.top-recent-title{font-family:'Great Vibes',cursive;font-size:1.6rem;color:var(--br-md);margin-bottom:.8rem;}
.recent-list{display:flex;flex-direction:column;gap:.7rem;}
.recent-card{background:#fff;border-radius:10px;padding:.9rem 1.1rem;box-shadow:0 2px 8px var(--shadow);cursor:pointer;display:flex;align-items:center;gap:.9rem;transition:box-shadow .18s,transform .15s;border-left:4px solid var(--br-lt);}
.recent-card:hover{box-shadow:0 4px 16px var(--shadow);transform:translateY(-1px);}
.recent-color-dot{width:14px;height:14px;border-radius:50%;flex-shrink:0;}
.recent-info{flex:1;min-width:0;}
.recent-name{font-weight:700;font-size:.92rem;color:var(--br-dk);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.recent-type{font-size:.78rem;color:var(--muted);}
.recent-stars{color:var(--gold);font-size:.85rem;flex-shrink:0;}
.recent-date{font-size:.75rem;color:#bbb;flex-shrink:0;}

/* Stats mini */
.top-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:.8rem;margin-bottom:1.4rem;}
.top-stat{background:#fff;border-radius:12px;padding:.9rem;text-align:center;box-shadow:0 2px 8px var(--shadow);}
.top-stat .num{font-size:1.7rem;font-weight:700;color:var(--br-md);}
.top-stat .lbl{font-size:.72rem;color:var(--muted);}

/* ===== FORM ===== */
.card{background:var(--card);border-radius:14px;padding:1.8rem;box-shadow:0 2px 16px var(--shadow);margin-bottom:1.5rem;}
.card-title{font-family:'Great Vibes',cursive;font-size:1.8rem;color:var(--br-md);margin-bottom:1.2rem;}

.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem;}
@media(max-width:560px){.form-grid{grid-template-columns:1fr;}}
.fg{display:flex;flex-direction:column;gap:.35rem;}
.fg.full{grid-column:1/-1;}
label{font-size:.82rem;color:var(--br-md);font-weight:700;letter-spacing:.03em;}
label .unit{font-weight:normal;color:#999;margin-left:.3rem;}
input[type=text],input[type=number],input[type=date],select,textarea{
  border:1.5px solid var(--border);border-radius:8px;padding:.6rem .8rem;
  font-size:.95rem;font-family:'Lato','Hiragino Kaku Gothic ProN',sans-serif;
  color:var(--text);transition:border-color .2s;width:100%;background:#fffaf5;}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--br-lt);background:#fff;}
textarea{resize:vertical;min-height:80px;}

/* Star rating */
.star-group{display:flex;gap:.3rem;align-items:center;flex-direction:row-reverse;}
.star-group input{display:none;}
.star-group label{font-size:1.8rem;color:#ddd;cursor:pointer;font-weight:normal;letter-spacing:0;line-height:1;transition:color .15s;}
.star-group input:checked~label,.star-group label:hover,.star-group label:hover~label{color:var(--gold);}

/* Tea color picker */
.color-row{display:flex;gap:.5rem;flex-wrap:wrap;align-items:center;}
.tc{width:34px;height:34px;border-radius:50%;border:3px solid transparent;cursor:pointer;transition:transform .15s,border-color .15s;}
.tc:hover{transform:scale(1.15);}
.tc.sel{border-color:var(--br-dk);}
.color-lbl{font-size:.8rem;color:#999;margin-left:.3rem;}

/* Timer */
.timer-row{display:flex;gap:.5rem;align-items:center;}
.timer-row input{flex:1;}
.timer-btn{background:var(--br-md);color:#fff;border:none;border-radius:8px;padding:.55rem .9rem;cursor:pointer;font-size:.88rem;white-space:nowrap;font-family:'Lato',sans-serif;transition:background .2s;}
.timer-btn:hover{background:var(--br-dk);}
#timer-display{font-size:1.2rem;font-weight:700;color:var(--br-dk);min-width:55px;text-align:center;}

/* Benefits box */
.benefits-box{background:linear-gradient(135deg,rgba(212,169,66,.1),rgba(200,149,92,.1));border:1.5px solid rgba(212,169,66,.35);border-radius:12px;padding:1.2rem 1.4rem;display:none;}
.benefits-box.show{display:block;}
.ben-title{font-family:'Great Vibes',cursive;font-size:1.4rem;color:var(--br-dk);margin-bottom:.7rem;}
.ben-tags{display:flex;gap:.5rem;flex-wrap:wrap;margin-bottom:.7rem;}
.ben-tag{background:rgba(212,169,66,.18);color:var(--br-md);border:1px solid rgba(212,169,66,.4);border-radius:20px;padding:.25rem .75rem;font-size:.78rem;font-weight:700;}
.ben-desc{font-size:.86rem;color:var(--muted);line-height:1.7;}
.ben-caution{font-size:.78rem;color:#b06030;margin-top:.5rem;background:rgba(176,96,48,.08);padding:.5rem .8rem;border-radius:8px;}

/* Photo upload */
.photo-zone{border:2px dashed var(--border);border-radius:10px;padding:1rem;text-align:center;cursor:pointer;position:relative;transition:border-color .2s,background .2s;}
.photo-zone:hover{border-color:var(--br-lt);background:rgba(200,149,92,.05);}
.photo-zone input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;}
.photo-zone p{font-size:13px;color:var(--muted);pointer-events:none;}
.photo-previews{display:flex;gap:.5rem;flex-wrap:wrap;margin-top:.8rem;}
.photo-thumb{position:relative;}
.photo-thumb img{width:72px;height:72px;object-fit:cover;border-radius:8px;border:2px solid var(--border);display:block;}
.photo-thumb .rm{position:absolute;top:-6px;right:-6px;background:var(--br-dk);color:#fff;border:none;border-radius:50%;width:20px;height:20px;font-size:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;}

/* Submit */
.submit-btn{width:100%;padding:1rem;background:linear-gradient(135deg,var(--br-md),var(--br-dk));color:#fff;border:none;border-radius:10px;font-size:1rem;font-family:'Lato',sans-serif;cursor:pointer;letter-spacing:.08em;margin-top:.5rem;transition:opacity .2s;}
.submit-btn:hover{opacity:.88;}

/* History */
.filter-row{display:flex;gap:.8rem;flex-wrap:wrap;align-items:center;margin-bottom:1.2rem;}
.filter-row input,.filter-row select{padding:.5rem .8rem;border:1.5px solid var(--border);border-radius:8px;font-family:'Lato',sans-serif;font-size:.9rem;background:#fff;}
.filter-row input{flex:1;min-width:140px;}

.log-card{background:#fff;border-radius:12px;padding:1.2rem 1.4rem;box-shadow:0 2px 10px var(--shadow);margin-bottom:1rem;cursor:pointer;transition:box-shadow .2s,transform .15s;border-left:5px solid var(--br-lt);}
.log-card:hover{box-shadow:0 4px 20px var(--shadow);transform:translateY(-1px);}
.lc-head{display:flex;justify-content:space-between;align-items:flex-start;gap:.5rem;}
.lc-name{font-family:'Great Vibes',cursive;font-size:1.4rem;color:var(--br-dk);}
.lc-date{font-size:.78rem;color:#999;}
.lc-stars{color:var(--gold);font-size:1rem;margin:.3rem 0;}
.badges{display:flex;gap:.4rem;flex-wrap:wrap;margin-top:.5rem;}
.bdg{background:#f5ede0;color:var(--br-md);font-size:.75rem;padding:.2rem .6rem;border-radius:20px;white-space:nowrap;}
.lc-memo{font-size:.86rem;color:#555;margin-top:.6rem;line-height:1.55;}
.lc-thumbs{display:flex;gap:.4rem;margin-top:.7rem;flex-wrap:wrap;}
.lc-thumbs img{width:58px;height:58px;object-fit:cover;border-radius:6px;}
.del-btn{background:none;border:none;color:#ccc;cursor:pointer;font-size:1rem;margin-left:.3rem;transition:color .15s;}
.del-btn:hover{color:#e74c3c;}
.empty-state{text-align:center;padding:3rem;color:#bbb;font-size:1rem;}

/* Stats */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:1rem;margin-bottom:1.5rem;}
.stat-box{background:#fff;border-radius:12px;padding:1.2rem;text-align:center;box-shadow:0 2px 10px var(--shadow);}
.stat-num{font-size:2rem;font-weight:700;color:var(--br-md);}
.stat-lbl{font-size:.8rem;color:#999;margin-top:.2rem;}
.chart-wrap{background:#fff;border-radius:12px;padding:1.4rem;box-shadow:0 2px 10px var(--shadow);}
.chart-title{font-family:'Great Vibes',cursive;font-size:1.4rem;color:var(--br-md);margin-bottom:1rem;}
.bar-chart{display:flex;flex-direction:column;gap:.6rem;}
.bar-row{display:flex;align-items:center;gap:.8rem;}
.bar-lbl{font-size:.82rem;min-width:130px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text);}
.bar-track{flex:1;background:#f5ede0;border-radius:4px;height:14px;}
.bar-fill{background:linear-gradient(90deg,var(--br-lt),var(--br-md));height:14px;border-radius:4px;transition:width .5s;}
.bar-count{font-size:.8rem;color:#888;min-width:24px;text-align:right;}

/* Modal */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;align-items:center;justify-content:center;}
.modal-overlay.open{display:flex;}
.modal{background:#fff;border-radius:16px;padding:2rem;max-width:560px;width:90%;max-height:90vh;overflow-y:auto;position:relative;}
.modal-close{position:absolute;top:1rem;right:1rem;background:none;border:none;font-size:1.4rem;cursor:pointer;color:#888;}
.modal h2{font-family:'Great Vibes',cursive;font-size:1.8rem;color:var(--br-dk);margin-bottom:1rem;}
.detail-row{display:flex;gap:.5rem;align-items:baseline;border-bottom:1px solid #f0e8dc;padding:.5rem 0;}
.detail-label{font-size:.8rem;color:#999;min-width:110px;}
.detail-value{font-size:.92rem;color:var(--text);}
.detail-photos{display:flex;gap:.5rem;flex-wrap:wrap;margin-top:.8rem;}
.detail-photos img{border-radius:8px;max-height:180px;max-width:100%;object-fit:cover;}
.detail-benefits{background:linear-gradient(135deg,rgba(212,169,66,.08),rgba(200,149,92,.08));border:1.5px solid rgba(212,169,66,.3);border-radius:10px;padding:1rem;margin-top:1rem;}

/* Toast */
#toast{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%);background:var(--br-dk);color:#fff;padding:.7rem 1.4rem;border-radius:30px;font-size:.88rem;opacity:0;transition:opacity .3s;pointer-events:none;z-index:999;}
#toast.show{opacity:1;}
</style>
</head>
<body>
<a href="index.html" style="display:inline-block; margin: 16px 0; padding: 10px 14px; background:#f3f3f3; color:#333; text-decoration:none; border-radius:10px;">
  ← マイアプリに戻る
</a>
<header>
  <div class="h-title">Tea Diary</div>
  <p class="h-sub">すべてのお茶を、丁寧に記録する</p>
</header>

<nav>
  <button class="active" id="nav-top"    onclick="switchTab('top')">🏠 ホーム</button>
  <button id="nav-new"    onclick="switchTab('new')">✏️ 記録する</button>
  <button id="nav-history" onclick="switchTab('history')">📖 ログ一覧</button>
  <button id="nav-stats"  onclick="switchTab('stats')">📊 統計</button>
</nav>

<main>

<!-- ===== TOP ===== -->
<div id="tab-top" class="tab-content active">
  <div class="top-hero">
    <div class="top-hero-title">My Tea Collection</div>
    <div class="top-hero-sub">カテゴリを選んでログを絞り込む</div>
  </div>

  <div class="top-stats" id="topStats"></div>

  <div class="tea-category-grid" id="catGrid"></div>

  <div class="top-recent">
    <div class="top-recent-title">最近の記録</div>
    <div class="recent-list" id="recentList"></div>
  </div>
</div>

<!-- ===== 記録 ===== -->
<div id="tab-new" class="tab-content">
<div class="card">
  <div class="card-title">新しいお茶を記録</div>
  <form id="tea-form" onsubmit="saveTea(event)">
    <div class="form-grid">

      <div class="fg">
        <label>📅 日付</label>
        <input type="date" id="f-date" required>
      </div>

      <div class="fg">
        <label>🍵 お茶の種類（大分類）</label>
        <select id="f-category" onchange="updateTypeOptions()">
          <option value="">選択してください</option>
          <option value="black">紅茶</option>
          <option value="green">緑茶・日本茶</option>
          <option value="oolong">烏龍茶</option>
          <option value="white">白茶</option>
          <option value="herbal">ハーブティー</option>
          <option value="flower">フラワーティー</option>
          <option value="other">その他</option>
        </select>
      </div>

      <div class="fg full">
        <label>🌿 茶葉の詳細</label>
        <select id="f-type" onchange="showBenefits(this.value)">
          <option value="">先に種類を選んでください</option>
        </select>
      </div>

      <!-- 効能ボックス -->
      <div class="fg full">
        <div class="benefits-box" id="benefitsBox">
          <div class="ben-title" id="benTitle"></div>
          <div class="ben-tags" id="benTags"></div>
          <div class="ben-desc" id="benDesc"></div>
          <div class="ben-caution" id="benCaution"></div>
        </div>
      </div>

      <div class="fg full">
        <label>🏷️ 銘柄・ブランド名</label>
        <input type="text" id="f-brand" placeholder="例：マリアージュフレール、一保堂…">
      </div>

      <div class="fg">
        <label>⚖️ 茶葉の量 <span class="unit">g</span></label>
        <input type="number" id="f-amount" min="0" step="0.1" placeholder="例：3">
      </div>

      <div class="fg">
        <label>💧 水の量 <span class="unit">ml</span></label>
        <input type="number" id="f-water" min="0" step="10" placeholder="例：200">
      </div>

      <div class="fg">
        <label>🌡️ お湯の温度 <span class="unit">℃</span></label>
        <input type="number" id="f-temp" min="0" max="100" placeholder="例：80">
      </div>

      <div class="fg">
        <label>🚰 水の種類</label>
        <select id="f-water-type">
          <option value="">選択してください</option>
          <option>軟水（ミネラルウォーター）</option>
          <option>中硬水</option>
          <option>硬水</option>
          <option>浄水器の水</option>
          <option>水道水</option>
        </select>
      </div>

      <div class="fg full">
        <label>⏱️ 蒸らし時間 <span class="unit">分:秒</span></label>
        <div class="timer-row">
          <input type="text" id="f-steep" placeholder="例：3:00">
          <button type="button" class="timer-btn" onclick="startTimer()">▶ タイマー</button>
          <span id="timer-display">0:00</span>
          <button type="button" class="timer-btn" onclick="resetTimer()" style="background:#999">■</button>
        </div>
      </div>

      <div class="fg full">
        <label>🎨 水色（茶の色）</label>
        <div class="color-row">
          <div class="tc sel" data-color="#f9e4b7" style="background:#f9e4b7" title="ゴールデン" onclick="selColor(this)"></div>
          <div class="tc" data-color="#e8e8b0" style="background:#e8e8b0" title="ライトグリーン" onclick="selColor(this)"></div>
          <div class="tc" data-color="#b8d4a0" style="background:#b8d4a0" title="グリーン" onclick="selColor(this)"></div>
          <div class="tc" data-color="#e8b877" style="background:#e8b877" title="アンバー" onclick="selColor(this)"></div>
          <div class="tc" data-color="#c87941" style="background:#c87941" title="オレンジブラウン" onclick="selColor(this)"></div>
          <div class="tc" data-color="#8b4513" style="background:#8b4513" title="ダークブラウン" onclick="selColor(this)"></div>
          <div class="tc" data-color="#c9a96e" style="background:#c9a96e" title="ミルクティー" onclick="selColor(this)"></div>
          <div class="tc" data-color="#e8c8d8" style="background:#e8c8d8" title="ピンク" onclick="selColor(this)"></div>
          <span class="color-lbl" id="color-name">ゴールデン</span>
        </div>
        <input type="hidden" id="f-color" value="#f9e4b7">
      </div>

      <div class="fg">
        <label>🍃 茶葉の形状</label>
        <select id="f-leaf">
          <option value="">選択してください</option>
          <option>ホールリーフ（大きな葉）</option>
          <option>ブロークン（中くらい）</option>
          <option>ファニングス（細かい）</option>
          <option>ダスト（粉末）</option>
          <option>CTC</option>
          <option>ティーバッグ</option>
          <option>粉末（抹茶・パウダー）</option>
        </select>
      </div>

      <div class="fg">
        <label>⭐ 評価</label>
        <div class="star-group">
          <input type="radio" name="rating" id="r5" value="5"><label for="r5">★</label>
          <input type="radio" name="rating" id="r4" value="4"><label for="r4">★</label>
          <input type="radio" name="rating" id="r3" value="3" checked><label for="r3">★</label>
          <input type="radio" name="rating" id="r2" value="2"><label for="r2">★</label>
          <input type="radio" name="rating" id="r1" value="1"><label for="r1">★</label>
        </div>
      </div>

      <div class="fg full">
        <label>📝 味の感想・メモ</label>
        <textarea id="f-memo" placeholder="香り、渋み、甘さ、余韻など自由に記録してください…"></textarea>
      </div>

      <div class="fg full">
        <label>📷 写真</label>
        <div class="photo-zone">
          <input type="file" id="photoInput" accept="image/*" multiple>
          <p>📷 クリックまたはドラッグで写真を追加</p>
        </div>
        <div class="photo-previews" id="photo-previews"></div>
      </div>

    </div>
    <button type="submit" class="submit-btn">☕ 記録を保存する</button>
  </form>
</div>
</div>

<!-- ===== HISTORY ===== -->
<div id="tab-history" class="tab-content">
  <div class="filter-row">
    <input type="text" id="search-input" placeholder="🔍 銘柄・メモで検索…" oninput="renderHistory()">
    <select id="filter-cat" onchange="renderHistory()">
      <option value="">すべての種類</option>
      <option value="black">紅茶</option>
      <option value="green">緑茶・日本茶</option>
      <option value="oolong">烏龍茶</option>
      <option value="white">白茶</option>
      <option value="herbal">ハーブティー</option>
      <option value="flower">フラワーティー</option>
      <option value="other">その他</option>
    </select>
    <select id="sort-select" onchange="renderHistory()">
      <option value="newest">新しい順</option>
      <option value="oldest">古い順</option>
      <option value="rating-high">評価：高い順</option>

// ===== Data =====
var KEY = 'teaDiaryV3';
var formPhotos = [];
var selColorVal = '#f9e4b7';
var timerInterval = null, timerSec = 0, timerRunning = false;
var topFilter = null;

function loadLogs() { try { return JSON.parse(localStorage.getItem(KEY)) || []; } catch(e) { return []; } }
function saveLogs(l) { localStorage.setItem(KEY, JSON.stringify(l)); }

// ===== Init =====
document.getElementById('f-date').value = new Date().toISOString().split('T')[0];

// ===== Tabs =====
function switchTab(name) {
  document.querySelectorAll('.tab-content').forEach(function(el){ el.classList.remove('active'); });
  document.querySelectorAll('nav button').forEach(function(el){ el.classList.remove('active'); });
  document.getElementById('tab-'+name).classList.add('active');
  document.getElementById('nav-'+name).classList.add('active');
  if (name === 'top')     renderTop();
  if (name === 'history') renderHistory();
  if (name === 'stats')   renderStats();
}

// ===== Type options =====
function updateTypeOptions() {
  var cat = document.getElementById('f-category').value;
  var sel = document.getElementById('f-type');
  sel.innerHTML = '<option value="">選択してください</option>';
  if (cat && TEA_TYPES[cat]) {
    TEA_TYPES[cat].forEach(function(t) {
      var opt = document.createElement('option');
      opt.value = t; opt.textContent = t;
      sel.appendChild(opt);
    });
  }
  document.getElementById('benefitsBox').classList.remove('show');
}

// ===== Benefits =====
function showBenefits(type) {
  var box = document.getElementById('benefitsBox');
  var b = BENEFITS[type];
  if (!b) { box.classList.remove('show'); return; }
  document.getElementById('benTitle').textContent = '✨ ' + type + ' の効果・効能';
  document.getElementById('benTags').innerHTML = b.tags.map(function(t){ return '<span class="ben-tag">'+t+'</span>'; }).join('');
  document.getElementById('benDesc').textContent = b.desc;
  document.getElementById('benCaution').innerHTML = '⚠️ ' + b.caution;
  box.classList.add('show');
}

// ===== Color =====
var COLOR_NAMES = {'#f9e4b7':'ゴールデン','#e8e8b0':'ライトグリーン','#b8d4a0':'グリーン','#e8b877':'アンバー','#c87941':'オレンジブラウン','#8b4513':'ダークブラウン','#c9a96e':'ミルクティー','#e8c8d8':'ピンク'};
function selColor(el) {
  document.querySelectorAll('.tc').forEach(function(e){ e.classList.remove('sel'); });
  el.classList.add('sel');
  selColorVal = el.dataset.color;
  document.getElementById('f-color').value = selColorVal;
  document.getElementById('color-name').textContent = COLOR_NAMES[selColorVal] || '';
}

// ===== Timer =====
function startTimer() {
  var raw = document.getElementById('f-steep').value.trim();
  var secs = 0;
  if (raw && raw.includes(':')) { var p = raw.split(':'); secs = parseInt(p[0])*60 + parseInt(p[1]||0); }
  else if (raw) { secs = parseFloat(raw) * 60; }
  if (!secs || timerRunning) return;
  timerSec = secs; timerRunning = true;
  timerInterval = setInterval(function() {
    timerSec--;
    var m = Math.floor(timerSec/60), s = timerSec % 60;
    document.getElementById('timer-display').textContent = m + ':' + (s<10?'0':'') + s;
    if (timerSec <= 0) { clearInterval(timerInterval); timerRunning = false; showToast('⏰ 蒸らし完了！'); }
  }, 1000);
}
function resetTimer() { clearInterval(timerInterval); timerRunning=false; timerSec=0; document.getElementById('timer-display').textContent='0:00'; }

// ===== Photos =====
document.getElementById('photoInput').addEventListener('change', function(e) {
  Array.from(e.target.files).forEach(function(file) {
    var r = new FileReader();
    r.onload = function(ev) { formPhotos.push(ev.target.result); renderPreviews(); };
    r.readAsDataURL(file);
  });
  this.value = '';
});
function renderPreviews() {
  var wrap = document.getElementById('photo-previews');
  wrap.innerHTML = formPhotos.map(function(s, i) {
    return '<div class="photo-thumb"><img src="'+s+'"><button class="rm" data-i="'+i+'">×</button></div>';
  }).join('');
  wrap.querySelectorAll('.rm').forEach(function(btn) {
    btn.addEventListener('click', function(){ formPhotos.splice(+btn.dataset.i,1); renderPreviews(); });
  });
}

// ===== Save =====
function saveTea(e) {
  e.preventDefault();
  var type = document.getElementById('f-type').value;
  var cat  = document.getElementById('f-category').value;
  if (!cat) { alert('お茶の種類を選んでください'); return; }
  var log = {
    id: String(Date.now()),
    date: document.getElementById('f-date').value,
    category: cat,
    type: type,
    brand: document.getElementById('f-brand').value.trim(),
    amount: document.getElementById('f-amount').value,
    water:  document.getElementById('f-water').value,
    temp:   document.getElementById('f-temp').value,
    waterType: document.getElementById('f-water-type').value,
    steep: document.getElementById('f-steep').value.trim(),
    color: selColorVal,
    leaf:  document.getElementById('f-leaf').value,
    rating: document.querySelector('input[name=rating]:checked')?.value || '3',
    memo:  document.getElementById('f-memo').value.trim(),
    photos: formPhotos.slice(),
    benefits: BENEFITS[type] || null,
  };
  var logs = loadLogs();
  logs.unshift(log);
  saveLogs(logs);
  document.getElementById('tea-form').reset();
  document.getElementById('f-date').value = new Date().toISOString().split('T')[0];
  document.getElementById('f-type').innerHTML = '<option value="">先に種類を選んでください</option>';
  formPhotos = []; renderPreviews();
  document.querySelectorAll('.tc').forEach(function(e){ e.classList.remove('sel'); });
  document.querySelector('.tc[data-color="#f9e4b7"]').classList.add('sel');
  selColorVal='#f9e4b7'; document.getElementById('color-name').textContent='ゴールデン';
  document.getElementById('benefitsBox').classList.remove('show');
  showToast('☕ 記録を保存しました！');
}

// ===== TOP =====
function renderTop() {
  var logs = loadLogs();
  // Stats
  var cats = {}; logs.forEach(function(l){ if(l.category) cats[l.category]=(cats[l.category]||0)+1; });
  var avg = logs.length ? (logs.reduce(function(s,l){ return s+(+l.rating); },0)/logs.length).toFixed(1) : '—';
  document.getElementById('topStats').innerHTML =
    '<div class="top-stat"><div class="num">'+logs.length+'</div><div class="lbl">記録数</div></div>' +
    '<div class="top-stat"><div class="num">'+Object.keys(cats).length+'</div><div class="lbl">種類数</div></div>' +
    '<div class="top-stat"><div class="num">'+avg+'</div><div class="lbl">平均評価</div></div>';

  // Category cards
  var html = '';
  Object.keys(CAT_INFO).forEach(function(k) {
    var info = CAT_INFO[k];
    var cnt = cats[k] || 0;
    html += '<div class="tea-cat-card' + (topFilter===k?' selected':'') + '" data-cat="'+k+'">' +
      '<div class="cat-icon">'+info.icon+'</div>' +
      '<div class="cat-name">'+info.name+'</div>' +
      '<div class="cat-name-en">'+info.nameEn+'</div>' +
      '<div class="cat-count">'+cnt+'件</div>' +
    '</div>';
  });
  document.getElementById('catGrid').innerHTML = html;
  document.querySelectorAll('.tea-cat-card').forEach(function(el) {
    el.addEventListener('click', function() {
      topFilter = topFilter === el.dataset.cat ? null : el.dataset.cat;
      renderTop();
    });
  });

  // Recent list
  var filtered = topFilter ? logs.filter(function(l){ return l.category===topFilter; }) : logs;
  var recent = filtered.slice(0, 5);
  if (!recent.length) {
    document.getElementById('recentList').innerHTML = '<div class="empty-state">まだ記録がありません。「記録する」から追加しましょう！</div>';
    return;
  }
  document.getElementById('recentList').innerHTML = recent.map(function(l) {
    var info = CAT_INFO[l.category] || {icon:'☕'};
    var stars = '★'.repeat(+l.rating) + '☆'.repeat(5-+l.rating);
    return '<div class="recent-card" data-id="'+l.id+'">' +
      '<div class="recent-color-dot" style="background:'+l.color+'"></div>' +
      '<div class="recent-info">' +
        '<div class="recent-name">'+(l.brand||l.type||info.name)+'</div>' +
        '<div class="recent-type">'+info.icon+' '+(l.type||info.name)+'</div>' +
      '</div>' +
      '<div class="recent-stars">'+stars+'</div>' +
      '<div class="recent-date">'+l.date+'</div>' +
    '</div>';
  }).join('');
  document.querySelectorAll('.recent-card').forEach(function(el) {
    el.addEventListener('click', function(){ openModal(el.dataset.id); });
  });
}

// ===== History =====
function renderHistory() {
  var logs = loadLogs();
  var q  = document.getElementById('search-input').value.toLowerCase();
  var fc = document.getElementById('filter-cat').value;
  var so = document.getElementById('sort-select').value;
  if (q)  logs = logs.filter(function(l){ return (l.brand||'').toLowerCase().includes(q)||(l.memo||'').toLowerCase().includes(q)||(l.type||'').toLowerCase().includes(q); });
  if (fc) logs = logs.filter(function(l){ return l.category===fc; });
  if (so==='oldest')      logs = logs.slice().reverse();
  else if (so==='rating-high') logs = logs.slice().sort(function(a,b){ return b.rating-a.rating; });
  else if (so==='rating-low')  logs = logs.slice().sort(function(a,b){ return a.rating-b.rating; });
  var el = document.getElementById('history-list');
  if (!logs.length) { el.innerHTML='<div class="empty-state">📭 記録がありません</div>'; return; }
  var html = '';
  logs.forEach(function(l) {
    var info = CAT_INFO[l.category] || {icon:'☕'};
    var stars = '★'.repeat(+l.rating) + '☆'.repeat(5-+l.rating);
    html += '<div class="log-card" data-id="'+l.id+'">' +
      '<div class="lc-head">' +
        '<div>' +
          '<div class="lc-name">'+(l.brand||l.type||'—')+'</div>' +
          '<div class="lc-date">'+l.date+'</div>' +
          '<div class="lc-stars">'+stars+'</div>' +
        '</div>' +
        '<button class="del-btn" data-id="'+l.id+'">🗑</button>' +
      '</div>' +
      '<div class="badges">' +
        (l.category?'<span class="bdg">'+info.icon+' '+(l.type||info.name)+'</span>':'') +
        (l.amount?'<span class="bdg">⚖️ '+l.amount+'g</span>':'') +
        (l.temp?'<span class="bdg">🌡️ '+l.temp+'℃</span>':'') +
        (l.steep?'<span class="bdg">⏱ '+l.steep+'</span>':'') +
      '</div>' +
      (l.memo?'<div class="lc-memo">'+l.memo.slice(0,80)+(l.memo.length>80?'…':'')+'</div>':'') +
      (l.photos&&l.photos.length?'<div class="lc-thumbs">'+l.photos.slice(0,3).map(function(s){ return '<img src="'+s+'" alt="">'; }).join('')+'</div>':'') +
    '</div>';
  });
  el.innerHTML = html;
  el.querySelectorAll('.log-card').forEach(function(card) {
    card.addEventListener('click', function(e) {
      if (e.target.classList.contains('del-btn')) return;
      openModal(card.dataset.id);
    });
  });
  el.querySelectorAll('.del-btn').forEach(function(btn) {
    btn.addEventListener('click', function(e) {
      e.stopPropagation();
      if (!confirm('この記録を削除しますか？')) return;
      saveLogs(loadLogs().filter(function(l){ return l.id!==btn.dataset.id; }));
      renderHistory();
    });
  });
}

// ===== Modal =====
function openModal(id) {
  var l = loadLogs().find(function(x){ return x.id===id; });
  if (!l) return;
  var info = CAT_INFO[l.category] || {icon:'☕',name:''};
  var stars = '★'.repeat(+l.rating) + '☆'.repeat(5-+l.rating);
  var rows = [
    ['日付',l.date],['カテゴリ',info.icon+' '+(l.type||info.name)],
    ['銘柄',l.brand],['評価',stars],
    ['茶葉の量',l.amount?l.amount+'g':null],['水の量',l.water?l.water+'ml':null],
    ['温度',l.temp?l.temp+'℃':null],['水の種類',l.waterType],
    ['蒸らし時間',l.steep],['茶葉の形状',l.leaf],
  ].filter(function(r){ return r[1]; });
  var benHtml = '';
  if (l.benefits) {
    benHtml = '<div class="detail-benefits" style="margin-top:1rem">' +
      '<strong>✨ 効果・効能</strong>' +
      '<div style="display:flex;gap:.4rem;flex-wrap:wrap;margin:.5rem 0">'+l.benefits.tags.map(function(t){ return '<span class="ben-tag">'+t+'</span>'; }).join('')+'</div>' +
      '<p style="font-size:.86rem;color:var(--muted);line-height:1.6">'+l.benefits.desc+'</p>' +
      '</div>';
  }
  document.getElementById('modal-content').innerHTML =
    '<h2>'+(l.brand||l.type||'記録')+'</h2>' +
    rows.map(function(r){ return '<div class="detail-row"><span class="detail-label">'+r[0]+'</span><span class="detail-value">'+r[1]+'</span></div>'; }).join('') +
    (l.memo?'<div class="detail-row"><span class="detail-label">メモ</span><span class="detail-value">'+l.memo+'</span></div>':'') +
    benHtml +
    (l.photos&&l.photos.length?'<div class="detail-photos">'+l.photos.map(function(s){ return '<img src="'+s+'" alt="">'; }).join('')+'</div>':'');
  document.getElementById('modal-overlay').classList.add('open');
}
function closeModal() { document.getElementById('modal-overlay').classList.remove('open'); }
document.getElementById('modal-overlay').addEventListener('click', function(e){ if(e.target===this) closeModal(); });

// ===== Stats =====
function renderStats() {
  var logs = loadLogs();
  var avg = logs.length ? (logs.reduce(function(s,l){ return s+(+l.rating); },0)/logs.length).toFixed(1) : '—';
  var cats = {}; var types = {};
  logs.forEach(function(l){
    if(l.category) cats[l.category]=(cats[l.category]||0)+1;
    if(l.type) types[l.type]=(types[l.type]||0)+1;
  });
  document.getElementById('stats-boxes').innerHTML =
    '<div class="stat-box"><div class="stat-num">'+logs.length+'</div><div class="stat-lbl">総記録数</div></div>' +
    '<div class="stat-box"><div class="stat-num">'+(avg||'—')+'</div><div class="stat-lbl">平均評価</div></div>' +
    '<div class="stat-box"><div class="stat-num">'+Object.keys(cats).length+'</div><div class="stat-lbl">カテゴリ数</div></div>';
  var top5 = Object.entries(types).sort(function(a,b){ return b[1]-a[1]; }).slice(0,5);
  var max = top5[0] ? top5[0][1] : 1;
  document.getElementById('bar-chart').innerHTML = top5.length ? top5.map(function(e) {
    return '<div class="bar-row">' +
      '<div class="bar-lbl">'+e[0]+'</div>' +
      '<div class="bar-track"><div class="bar-fill" style="width:'+Math.round(e[1]/max*100)+'%"></div></div>' +
      '<div class="bar-count">'+e[1]+'</div>' +
    '</div>';
  }).join('') : '<p style="color:#ccc">データなし</p>';
}

// ===== Toast =====
function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(function(){ t.classList.remove('show'); }, 2500);
}

// ===== Init =====
renderTop();
</script>
